name: Deploy with TryCloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # npm ci is faster and safer since you have a package-lock.json
        run: npm ci

      - name: Install Cloudflare
        run: |
          npm install -g cloudflared

      - name: Start servers
        run: |
          npm run server &
          sleep 2
          npx vite --port=3000 --host &
          sleep 5
        shell: bash

      - name: Create tunnel and get URL
        id: tunnel
        run: |
          cloudflared tunnel --url http://localhost:3000 > tunnel.log 2>&1 &
          
          # Wait a bit longer to ensure Cloudflare generates the URL
          sleep 15
          
          URL=$(grep -o 'https://[^ ]*trycloudflare\.com' tunnel.log | head -1)

          if [ -z "$URL" ]; then
            echo "Tunnel failed to start. Printing logs:"
            cat tunnel.log
            exit 1
          fi

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "App deployed at: $URL"
          
          # This writes the URL to the GitHub Actions Summary UI so you can easily see it!
          echo "### 🚀 TryCloudflare Tunnel Active!" >> $GITHUB_STEP_SUMMARY
          echo "**Your temporary URL is:** [$URL]($URL)" >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Keep Server Alive (Wait)
        run: |
          echo "The server is now running. This step stays open for 1 hour to keep your site online."
          sleep 3600
