name: Deploy with TryCloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Cloudflare
        run: |
          npm install -g cloudflared

      - name: Start servers
        run: |
          npm run server &
          sleep 2
          npx vite --port=3000 --host &
          sleep 5
        shell: bash

      - name: Create tunnel
        id: tunnel
        run: |
          cloudflared tunnel --url http://localhost:3000 > tunnel.log 2>&1 &
          sleep 12
          URL=$(grep -o 'https://[^ ]*trycloudflare\.com' tunnel.log | head -1)

          if [ -z "$URL" ]; then
            echo "Tunnel failed to start"
            cat tunnel.log
            exit 1
          fi

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "App deployed at: $URL"
        shell: bash

      - name: Wait
        run: |
          sleep 3600
