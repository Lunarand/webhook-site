name: Deploy with TryCloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci

      - name: Install Cloudflare
        run: npm install -g cloudflared

      - name: Start Servers, Tunnel, and Wait
        run: |
          # 1. Start backend server
          npm run server &
          
          # 2. Force Vite to use IPv4 and strict port 3000. 
          # If 3000 is taken by the backend, this will explicitly fail instead of hiding the error.
          npx vite --port=3000 --host 127.0.0.1 --strictPort &
          
          sleep 10
          
          # 3. Explicitly target IPv4 instead of 'localhost'
          cloudflared tunnel --url http://127.0.0.1:3000 > tunnel.log 2>&1 &
          
          sleep 15
          
          URL=$(grep -o 'https://[^ ]*trycloudflare\.com' tunnel.log | head -1)

          if [ -z "$URL" ]; then
            echo "Tunnel failed to start. Printing logs:"
            cat tunnel.log
            exit 1
          fi

          echo "App deployed at: $URL"
          echo "### 🚀 TryCloudflare Tunnel Active!" >> $GITHUB_STEP_SUMMARY
          echo "**Your temporary URL is:** [$URL]($URL)" >> $GITHUB_STEP_SUMMARY
          
          echo "The servers are running. Keeping the workflow alive for 1 hour..."
          sleep 3600
        shell: bash
